kind = "web"
previewPath = "/"
title = "ParkEase India"
version = "1.0.0"
id = "artifacts/parkease"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18133

[services.development]
run = "pnpm --filter @workspace/parkease run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/parkease", "run", "build" ]
publicDir = "artifacts/parkease/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18133"
BASE_PATH = "/"
